name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Montar site estático
        run: |
          mkdir -p _site
          cp index.html index-legado.html diario.js app-shell.js sw.js manifest.webmanifest 404.html .nojekyll _site/
          cp -r css icons _site/
          if [ -f diario.css ]; then cp diario.css _site/; fi
          echo "Arquivos publicados:"
          ls -la _site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
